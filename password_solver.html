<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>密碼破解器</title>
<style>
body{
    font-family: Arial;
    max-width:600px;
    margin:auto;
}
button{
    padding:6px 10px;
    margin-top:10px;
}
</style>
</head>

<body>

<h2>4位密碼破解器 (只有1/2)</h2>

<p>輸入測試密碼與「錯幾個」</p>

測試密碼
<input id="guess" value="1111">

錯幾個
<input id="wrong" type="number" min="0" max="4">

<br>
<button onclick="add()">加入測試</button>

<h3>目前測試</h3>
<div id="tests"></div>

<h3>可能答案</h3>
<div id="result"></div>

<script>

let tests=[]

function add(){

let guess=document.getElementById("guess").value
let wrong=parseInt(document.getElementById("wrong").value)

tests.push({guess,wrong})

render()

}

function check(secret,guess){

let wrong=0

for(let i=0;i<4;i++)
if(secret[i]!=guess[i]) wrong++

return wrong

}

function generate(){

let arr=[]

for(let a of ["1","2"])
for(let b of ["1","2"])
for(let c of ["1","2"])
for(let d of ["1","2"])
arr.push(a+b+c+d)

return arr

}

function solve(){

let candidates=generate()

return candidates.filter(secret=>{
return tests.every(t=>check(secret,t.guess)==t.wrong)
})

}

function render(){

document.getElementById("tests").innerHTML=
tests.map(t=>`${t.guess} → 錯${t.wrong}`).join("<br>")

let result=solve()

document.getElementById("result").innerHTML=
result.join("<br>")

}

</script>

</body>
</html>
